name: Adapter Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/yanpub/adapters/**'
      - 'src/yanpub/core/quality.py'
      - 'src/yanpub/core/registry.py'
  pull_request:
    branches: [main]
    paths:
      - 'src/yanpub/adapters/**'
      - 'src/yanpub/core/quality.py'
      - 'src/yanpub/core/registry.py'
  # 允许手动触发
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 推送徽章数据到 gh-pages 分支
      pull-requests: write  # 在 PR 中评论
      actions: write        # 写入 Job Summary

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run quality check
        run: |
          yanpub quality --ci

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: |
            quality-report.json
            quality-badge.json
            quality-comment.md
          retention-days: 30

      # ---- PR 评论 ----
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('quality-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('适配器质量评分')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }

      # ---- 徽章部署到 gh-pages ----
      - name: Deploy badge to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 克隆或创建 gh-pages 分支
          git fetch origin gh-pages || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true

          # 复制徽章数据
          cp $GITHUB_WORKSPACE/quality-badge.json .
          cp $GITHUB_WORKSPACE/quality-report.json .

          git add quality-badge.json quality-report.json
          git diff --staged --quiet || git commit -m "Update adapter quality badge"
          git push origin gh-pages

  # ---- 质量回归检查 ----
  regression:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download previous report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: quality-report
          path: previous-report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check quality regression
        run: |
          python -c "
          import json, sys
          from pathlib import Path

          # 当前评分
          from yanpub.core.quality import QualityChecker
          current_reports = {r.lang_id: r for r in QualityChecker().check_all()}

          # 如果有之前的报告，做对比
          prev_path = Path('previous-report/quality-report.json')
          if prev_path.exists():
              prev_data = json.loads(prev_path.read_text())
              prev_reports = {a['lang_id']: a for a in prev_data.get('adapters', [])}

              regressions = []
              for lid, curr in current_reports.items():
                  if lid in prev_reports:
                      prev_score = prev_reports[lid]['total_score']
                      if curr.total_score < prev_score:
                          regressions.append(f'{curr.lang_name}({lid}): {prev_score} -> {curr.total_score} ({curr.total_score - prev_score})')

              if regressions:
                  print('⚠️  质量回归检测:')
                  for r in regressions:
                      print(f'  - {r}')
                  sys.exit(1)
              else:
                  print('✅ 无质量回归')
          else:
              print('ℹ️  无历史报告可对比，跳过回归检测')
          "
