<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言埠 适配器质量评分 — YanPub Quality</title>
    <link rel="stylesheet" href="quality.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="yan">言</span><span class="bu">埠</span>
            <span class="sub">质量评分</span>
        </div>
        <a href="/" class="nav-link">Playground</a>
        <a href="/challenges" class="nav-link">挑战赛</a>
        <a href="/quality" class="nav-link active">质量评分</a>
    </header>

    <div class="main-content">
        <!-- Overview -->
        <div id="overview" class="overview">
            <div class="overview-card">
                <div id="ov-count" class="overview-value">-</div>
                <div class="overview-label">适配器数量</div>
            </div>
            <div class="overview-card">
                <div id="ov-avg" class="overview-value">-</div>
                <div class="overview-label">平均得分</div>
            </div>
            <div class="overview-card">
                <div id="ov-highest" class="overview-value">-</div>
                <div class="overview-label">最高分</div>
            </div>
            <div class="overview-card">
                <div id="ov-grades" class="overview-value">-</div>
                <div class="overview-label">等级分布</div>
            </div>
        </div>

        <!-- Sort bar -->
        <div class="sort-bar">
            <span class="sort-label">排序</span>
            <select id="sort-select" class="sort-select" onchange="renderAdapters()">
                <option value="score-desc">得分从高到低</option>
                <option value="score-asc">得分从低到高</option>
                <option value="name-asc">名称 A-Z</option>
                <option value="grade-desc">等级从高到低</option>
            </select>
            <span id="adapter-count" class="adapter-count"></span>
        </div>

        <!-- Adapter cards -->
        <div id="adapter-list" class="adapter-list">
            <div class="loading"><div class="spinner"></div><br>加载中...</div>
        </div>
    </div>

    <footer>
        <span>言埠 YanPub 适配器质量评分</span>
        <span>yanpub v1.4.0</span>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="quality.js"></script>
</body>
</html>
