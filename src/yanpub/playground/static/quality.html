<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言埠 适配器质量评分 — YanPub Quality</title>
    <style>
        :root {
            --primary: #E85D3A;
            --primary-dark: #C44A2A;
            --bg: #1e1e1e;
            --header-bg: #181818;
            --card-bg: #2d2d2d;
            --text: #d4d4d4;
            --text-dim: #888;
            --border: #3e3e42;
            --success: #608b4e;
            --error: #f44747;
            --info: #569cd6;
            --warning: #dcdcaa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 48px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            gap: 16px;
            flex-shrink: 0;
        }
        .logo {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo .yan { color: var(--text); }
        .logo .bu { color: var(--primary); }
        .logo .sub { font-size: 12px; color: var(--text-dim); font-weight: normal; margin-left: 4px; }
        .nav-link {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #2d2d2d;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .nav-link:hover { border-color: var(--primary); color: var(--text); }
        .nav-link.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Main content */
        .main-content {
            flex: 1;
            padding: 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        /* Overview cards */
        .overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .overview-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .overview-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
        }
        .overview-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Adapter list */
        .adapter-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .adapter-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .adapter-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(232, 93, 58, 0.1);
        }
        .adapter-card.expanded {
            border-color: var(--primary);
        }
        .adapter-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .grade-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .adapter-info {
            flex: 1;
            min-width: 0;
        }
        .adapter-name {
            font-size: 16px;
            font-weight: bold;
        }
        .adapter-name small {
            color: var(--text-dim);
            font-weight: normal;
            font-size: 13px;
        }
        .adapter-score-text {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .adapter-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .score-big {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }
        .score-max {
            font-size: 14px;
            color: var(--text-dim);
        }
        .expand-icon {
            font-size: 12px;
            color: var(--text-dim);
            transition: transform 0.2s;
        }
        .adapter-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        /* Dimension bars */
        .adapter-detail {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .adapter-card.expanded .adapter-detail {
            display: block;
        }
        .dim-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .dim-name {
            width: 90px;
            font-size: 13px;
            color: var(--text-dim);
            text-align: right;
            flex-shrink: 0;
        }
        .dim-bar-bg {
            flex: 1;
            height: 10px;
            background: #1e1e1e;
            border-radius: 5px;
            overflow: hidden;
        }
        .dim-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        .dim-score {
            width: 50px;
            font-size: 13px;
            color: var(--text);
            text-align: left;
            flex-shrink: 0;
        }

        /* Details section */
        .detail-section {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .detail-block {
            background: #1e1e1e;
            border-radius: 6px;
            padding: 12px;
        }
        .detail-block h4 {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-item {
            font-size: 12px;
            color: var(--text);
            padding: 3px 0;
            line-height: 1.5;
        }
        .detail-item.suggestion {
            color: var(--warning);
        }
        .detail-item.pass {
            color: var(--success);
        }

        /* Sort bar */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .sort-label {
            font-size: 13px;
            color: var(--text-dim);
        }
        .sort-select {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #2d2d2d;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .sort-select:hover { border-color: var(--primary); }
        .adapter-count {
            font-size: 13px;
            color: var(--text-dim);
            margin-left: auto;
        }

        /* Footer */
        footer {
            padding: 6px 20px;
            background: var(--header-bg);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: #555;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: var(--success); color: white; }
        .toast.error { background: var(--error); color: white; }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .overview { grid-template-columns: repeat(2, 1fr); }
            .detail-section { grid-template-columns: 1fr; }
            .adapter-header { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="yan">言</span><span class="bu">埠</span>
            <span class="sub">质量评分</span>
        </div>
        <a href="/" class="nav-link">Playground</a>
        <a href="/challenges" class="nav-link">挑战赛</a>
        <a href="/quality" class="nav-link active">质量评分</a>
    </header>

    <div class="main-content">
        <!-- Overview -->
        <div id="overview" class="overview">
            <div class="overview-card">
                <div id="ov-count" class="overview-value">-</div>
                <div class="overview-label">适配器数量</div>
            </div>
            <div class="overview-card">
                <div id="ov-avg" class="overview-value">-</div>
                <div class="overview-label">平均得分</div>
            </div>
            <div class="overview-card">
                <div id="ov-highest" class="overview-value">-</div>
                <div class="overview-label">最高分</div>
            </div>
            <div class="overview-card">
                <div id="ov-grades" class="overview-value">-</div>
                <div class="overview-label">等级分布</div>
            </div>
        </div>

        <!-- Sort bar -->
        <div class="sort-bar">
            <span class="sort-label">排序</span>
            <select id="sort-select" class="sort-select" onchange="renderAdapters()">
                <option value="score-desc">得分从高到低</option>
                <option value="score-asc">得分从低到高</option>
                <option value="name-asc">名称 A-Z</option>
                <option value="grade-desc">等级从高到低</option>
            </select>
            <span id="adapter-count" class="adapter-count"></span>
        </div>

        <!-- Adapter cards -->
        <div id="adapter-list" class="adapter-list">
            <div class="loading"><div class="spinner"></div><br>加载中...</div>
        </div>
    </div>

    <footer>
        <span>言埠 YanPub 适配器质量评分</span>
        <span>yanpub v1.4.0</span>
    </footer>

    <div id="toast" class="toast"></div>

    <script>
    (function() {
        'use strict';

        const API_BASE = '';
        let reports = [];

        // ---- Utility ----
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => { t.className = 'toast'; }, 2500);
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function gradeColor(g) {
            const map = {'S':'#2ecc71','A':'#27ae60','B':'#3498db','C':'#f39c12','D':'#e67e22','F':'#e74c3c'};
            return map[g] || '#95a5a6';
        }

        function barColor(pct) {
            if (pct >= 80) return '#2ecc71';
            if (pct >= 50) return '#f39c12';
            return '#e74c3c';
        }

        function gradeRank(g) {
            const map = {'S':6,'A':5,'B':4,'C':3,'D':2,'F':1};
            return map[g] || 0;
        }

        // ---- Load ----
        function loadQuality() {
            fetch(API_BASE + '/api/quality')
                .then(r => r.json())
                .then(data => {
                    if (data.error) { showToast(data.error, 'error'); return; }
                    reports = data.reports || [];
                    renderOverview();
                    renderAdapters();
                })
                .catch(() => {
                    document.getElementById('adapter-list').innerHTML =
                        '<div style="text-align:center;padding:40px;color:var(--text-dim)">加载失败，请检查 Playground 是否正在运行</div>';
                });
        }

        // ---- Overview ----
        function renderOverview() {
            document.getElementById('ov-count').textContent = reports.length;

            if (reports.length === 0) {
                document.getElementById('ov-avg').textContent = '-';
                document.getElementById('ov-highest').textContent = '-';
                document.getElementById('ov-grades').textContent = '-';
                return;
            }

            const avg = reports.reduce((s, r) => s + r.total_score, 0) / reports.length;
            document.getElementById('ov-avg').textContent = avg.toFixed(1);

            const highest = reports.reduce((m, r) => r.total_score > m.total_score ? r : m, reports[0]);
            document.getElementById('ov-highest').textContent = highest.total_score;

            // Grade distribution
            const gradeCounts = {};
            reports.forEach(r => { gradeCounts[r.grade] = (gradeCounts[r.grade] || 0) + 1; });
            const gradeStr = Object.entries(gradeCounts)
                .sort((a, b) => gradeRank(b[0]) - gradeRank(a[0]))
                .map(([g, c]) => g + ':' + c)
                .join(' ');
            document.getElementById('ov-grades').textContent = gradeStr;
        }

        // ---- Adapter list ----
        window.renderAdapters = function() {
            const sortVal = document.getElementById('sort-select').value;
            let sorted = [...reports];

            switch (sortVal) {
                case 'score-desc': sorted.sort((a, b) => b.total_score - a.total_score); break;
                case 'score-asc': sorted.sort((a, b) => a.total_score - b.total_score); break;
                case 'name-asc': sorted.sort((a, b) => a.lang_name.localeCompare(b.lang_name, 'zh')); break;
                case 'grade-desc': sorted.sort((a, b) => gradeRank(b.grade) - gradeRank(a.grade) || b.total_score - a.total_score); break;
            }

            document.getElementById('adapter-count').textContent = sorted.length + ' 个适配器';

            const container = document.getElementById('adapter-list');
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">暂无适配器数据</div>';
                return;
            }

            container.innerHTML = '';
            sorted.forEach((r, idx) => {
                const card = document.createElement('div');
                card.className = 'adapter-card';
                card.dataset.idx = idx;

                // Dimensions HTML
                let dimHtml = '';
                r.dimensions.forEach(d => {
                    const pct = d.max_score > 0 ? (d.score / d.max_score * 100) : 0;
                    dimHtml += `
                        <div class="dim-row">
                            <span class="dim-name">${escHtml(d.name)}</span>
                            <div class="dim-bar-bg">
                                <div class="dim-bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div>
                            </div>
                            <span class="dim-score">${d.score}/${d.max_score}</span>
                        </div>`;
                });

                // Details HTML
                let detailsHtml = '';
                r.dimensions.forEach(d => {
                    const passItems = d.details.map(s => '<div class="detail-item pass">&#10003; ' + escHtml(s) + '</div>').join('');
                    const suggestItems = d.suggestions.map(s => '<div class="detail-item suggestion">&#9888; ' + escHtml(s) + '</div>').join('');
                    if (passItems || suggestItems) {
                        detailsHtml += `
                            <div class="detail-block">
                                <h4>${escHtml(d.name)}</h4>
                                ${passItems}${suggestItems}
                            </div>`;
                    }
                });

                const pct = r.max_score > 0 ? (r.total_score / r.max_score * 100) : 0;

                card.innerHTML = `
                    <div class="adapter-header">
                        <span class="grade-badge" style="background:${gradeColor(r.grade)}">${escHtml(r.grade)}</span>
                        <div class="adapter-info">
                            <div class="adapter-name">${escHtml(r.lang_name)} <small>${escHtml(r.lang_id)}</small></div>
                            <div class="adapter-score-text">${pct.toFixed(1)}% | ${r.dimensions.length} 个维度</div>
                        </div>
                        <div class="adapter-right">
                            <div>
                                <span class="score-big">${r.total_score}</span>
                                <span class="score-max">/${r.max_score}</span>
                            </div>
                            <span class="expand-icon">&#9660;</span>
                        </div>
                    </div>
                    <div class="adapter-detail">
                        ${dimHtml}
                        <div class="detail-section">
                            ${detailsHtml}
                        </div>
                    </div>`;

                card.addEventListener('click', function() {
                    this.classList.toggle('expanded');
                });

                container.appendChild(card);
            });
        };

        // ---- Init ----
        loadQuality();

    })();
    </script>
</body>
</html>
