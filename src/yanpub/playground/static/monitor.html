<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>言埠 YanPub 性能监控面板</title>
    <link rel="stylesheet" href="/static/monitor.css">
</head>
<body>

<div class="header">
    <h1>言埠 YanPub 性能监控面板</h1>
    <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">未连接</span>
    </div>
</div>

<div class="cards" id="overviewCards">
    <div class="card">
        <h3>活跃适配器</h3>
        <div class="value" id="activeAdapters">0</div>
        <div class="sub">正在监控中</div>
    </div>
    <div class="card">
        <h3>总样本数</h3>
        <div class="value" id="totalSamples">0</div>
        <div class="sub">已采集度量</div>
    </div>
    <div class="card">
        <h3>平均执行耗时</h3>
        <div class="value" id="avgDuration">--</div>
        <div class="sub">所有适配器</div>
    </div>
    <div class="card">
        <h3>整体错误率</h3>
        <div class="value" id="avgErrorRate">--</div>
        <div class="sub">所有操作</div>
    </div>
</div>

<h2>适配器概览</h2>
<div class="adapter-grid" id="adapterGrid">
    <div class="no-data">等待数据...</div>
</div>

<h2>实时折线图</h2>
<div class="chart-container">
    <div class="chart-title">
        <span>度量趋势</span>
        <select class="metric-select" id="metricSelect">
            <option value="eval_duration">eval 执行耗时</option>
            <option value="run_duration">run 执行耗时</option>
            <option value="tokenize_duration">tokenize 耗时</option>
            <option value="complete_duration">complete 耗时</option>
            <option value="error_rate">错误率</option>
        </select>
    </div>
    <svg class="chart-svg" id="chartSvg" viewBox="0 0 800 250">
        <line x1="50" y1="10" x2="50" y2="230" stroke="#2a2a4a" stroke-width="1"/>
        <line x1="50" y1="230" x2="790" y2="230" stroke="#2a2a4a" stroke-width="1"/>
        <text x="40" y="15" fill="#888" font-size="10" text-anchor="end" id="yMax">--</text>
        <text x="40" y="235" fill="#888" font-size="10" text-anchor="end">0</text>
        <text x="790" y="248" fill="#888" font-size="10" text-anchor="end" id="xLabel">时间</text>
        <g id="chartLines"></g>
        <g id="chartDots"></g>
    </svg>
</div>

<h2>趋势分析</h2>
<div class="chart-container">
    <table class="trend-table">
        <thead>
            <tr>
                <th>适配器</th>
                <th>度量</th>
                <th>近期均值</th>
                <th>之前均值</th>
                <th>变化</th>
                <th>状态</th>
            </tr>
        </thead>
        <tbody id="trendBody">
            <tr><td colspan="6" style="text-align:center;color:#888;">等待数据...</td></tr>
        </tbody>
    </table>
</div>

<footer>
    言埠 YanPub 性能监控面板 | 实时数据通过 WebSocket 推送
</footer>

    <script src="/static/monitor.js"></script>

</body>
</html>
