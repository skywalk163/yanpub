<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言埠 代码挑战赛 — YanPlay Challenges</title>
    <link rel="stylesheet" href="/static/challenges.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="yan">言</span><span class="bu">埠</span>
            <span class="sub">挑战赛</span>
        </div>
        <a href="/" class="nav-link">Playground</a>
        <a href="/challenges" class="nav-link active">挑战赛</a>
        <a href="/quality" class="nav-link">质量评分</a>
        <div class="header-right">
            <input id="username" class="user-input" type="text" placeholder="你的昵称" maxlength="20">
        </div>
    </header>

    <div class="main-content">
        <!-- Tab navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="list" onclick="switchTab('list')">题目列表</button>
            <button class="tab-btn" data-tab="leaderboard" onclick="switchTab('leaderboard')">排行榜</button>
        </div>

        <!-- List view -->
        <div id="list-view" class="list-view active">
            <!-- Filter bar -->
            <div class="filter-bar">
                <select id="filter-difficulty" class="filter-select" onchange="loadChallenges()">
                    <option value="">全部难度</option>
                    <option value="入门">入门</option>
                    <option value="简单">简单</option>
                    <option value="中等">中等</option>
                    <option value="困难">困难</option>
                    <option value="地狱">地狱</option>
                </select>
                <span id="challenge-count" class="challenge-count"></span>
            </div>

            <div id="challenge-grid" class="challenge-grid">
                <div class="loading"><div class="spinner"></div><br>加载中...</div>
            </div>
        </div>

        <!-- Detail view -->
        <div id="detail-view" class="detail-view">
            <div class="detail-header">
                <button class="back-btn" onclick="backToList()">&larr; 返回列表</button>
                <span id="detail-title" class="detail-title"></span>
                <span id="detail-difficulty" class="badge"></span>
                <span id="detail-score" style="color:var(--primary);font-weight:bold;margin-left:auto;"></span>
            </div>

            <div class="detail-section">
                <h3>题目描述</h3>
                <div id="detail-desc" class="detail-desc"></div>
            </div>

            <div class="detail-section">
                <h3>测试用例</h3>
                <div id="detail-test-cases"></div>
                <div id="detail-hidden-info" style="font-size:12px;color:var(--text-dim);margin-top:8px;"></div>
            </div>

            <div class="detail-section">
                <h3>提交解答</h3>
                <div class="submit-area">
                    <select id="submit-lang" class="submit-lang-select">
                        <option value="">选择语言</option>
                    </select>
                    <textarea id="submit-code" class="code-textarea" placeholder="在这里编写你的代码..."></textarea>
                    <button id="submit-btn" class="submit-btn" onclick="submitSolution()">提交</button>
                </div>
                <div id="submit-result" class="submit-result"></div>
            </div>

            <div class="detail-section">
                <h3>我的提交记录</h3>
                <div id="my-submissions" class="submissions-list">
                    <div style="color:var(--text-dim);font-size:13px;">暂无提交记录</div>
                </div>
            </div>
        </div>

        <!-- Leaderboard view -->
        <div id="leaderboard-view" class="leaderboard-view">
            <div class="detail-section">
                <h3>总排行榜</h3>
                <div id="global-leaderboard"></div>
            </div>
        </div>
    </div>

    <footer>
        <span>言埠 YanPub 代码挑战赛</span>
        <span>yanpub v1.4.0</span>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="/static/challenges.js"></script>
</body>
</html>
