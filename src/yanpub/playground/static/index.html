<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言埠 YanPlay — 中文编程语言 Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/theme/dracula.min.css">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="yan">言</span><span class="bu">埠</span>
            <span class="sub">YanPlay</span>
        </div>
        <select id="lang-select" class="lang-select">
            <option value="">加载中...</option>
        </select>
        <select id="example-select" class="lang-select" style="display:none;">
            <option value="">选择示例</option>
        </select>
        <button id="run-btn" class="run-btn">运行</button>
        <span class="shortcut-hint">Ctrl+Enter</span>
        <span id="lang-badge" class="lang-badge"></span>
        <button id="mode-toggle">对比模式</button>
        <button id="project-toggle" class="header-btn">项目模式</button>
        <button id="wasm-toggle" class="header-btn">WASM模式</button>
        <button id="collab-btn" class="header-btn">协作</button>
        <a href="/challenges" class="header-btn" style="text-decoration:none;">挑战赛</a>
        <a href="/quality" class="header-btn" style="text-decoration:none;">质量评分</a>
        <button id="share-btn" class="share-btn">分享</button>
        <span id="status"></span>
        <span id="collab-status"><span class="dot"></span></span>
    </header>

    <!-- Single mode -->
    <div id="single-mode" class="main single-mode">
        <div class="editor-pane">
            <div class="pane-header">
                <span class="title">编辑器</span>
                <span id="editor-lang"></span>
            </div>
            <div id="editor-container" class="editor-container">
                <textarea id="code-editor"></textarea>
            </div>
        </div>
        <div class="output-pane">
            <div class="pane-header">
                <span class="title">输出</span>
                <button id="clear-output" style="background:none;border:1px solid #555;color:#888;padding:1px 8px;border-radius:3px;cursor:pointer;font-size:11px;">清空</button>
            </div>
            <div id="output" class="output">
                <span class="placeholder">选择一种语言，编写代码并运行 (Ctrl+Enter)</span>
            </div>
        </div>
        <div id="collab-userlist" class="collab-userlist">
            <div class="collab-userlist-header">在线用户</div>
            <div id="collab-userlist-items" class="collab-userlist-items"></div>
        </div>
    </div>

    <!-- Compare mode -->
    <div id="compare-mode" class="main compare-mode">
        <div class="compare-panel" id="panel-left">
            <div class="pane-header">
                <select id="lang-left" class="lang-select" style="font-size:11px;padding:2px 6px;"></select>
                <span id="badge-left" class="lang-badge" style="font-size:10px;"></span>
            </div>
            <div class="inner-split">
                <div class="editor-area" style="flex:1.2;">
                    <div id="editor-left-container" class="editor-container">
                        <textarea id="editor-left"></textarea>
                    </div>
                </div>
                <div class="output-area" style="flex:0.8;">
                    <div class="pane-header">
                        <span class="title">输出</span>
                        <button class="clear-btn" data-target="output-left" style="background:none;border:1px solid #555;color:#888;padding:1px 8px;border-radius:3px;cursor:pointer;font-size:11px;">清空</button>
                    </div>
                    <div id="output-left" class="output">
                        <span class="placeholder">左侧输出</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="compare-divider"></div>
        <div class="compare-panel" id="panel-right">
            <div class="pane-header">
                <select id="lang-right" class="lang-select" style="font-size:11px;padding:2px 6px;"></select>
                <span id="badge-right" class="lang-badge" style="font-size:10px;"></span>
            </div>
            <div class="inner-split">
                <div class="editor-area" style="flex:1.2;">
                    <div id="editor-right-container" class="editor-container">
                        <textarea id="editor-right"></textarea>
                    </div>
                </div>
                <div class="output-area" style="flex:0.8;">
                    <div class="pane-header">
                        <span class="title">输出</span>
                        <button class="clear-btn" data-target="output-right" style="background:none;border:1px solid #555;color:#888;padding:1px 8px;border-radius:3px;cursor:pointer;font-size:11px;">清空</button>
                    </div>
                    <div id="output-right" class="output">
                        <span class="placeholder">右侧输出</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Project mode -->
    <div id="project-mode" class="main">
        <div id="project-sidebar" class="project-sidebar">
            <div class="project-sidebar-header">
                <span class="title">文件</span>
                <div class="project-sidebar-actions">
                    <button id="project-add-file-btn" title="新建文件">+</button>
                </div>
            </div>
            <div id="project-file-list" class="project-file-list"></div>
        </div>
        <div class="project-editor-area">
            <div class="project-toolbar">
                <span id="project-name-display" class="project-name">项目</span>
                <select id="project-lang-select">
                    <option value="">选择语言</option>
                </select>
                <button id="project-run-btn" class="run-btn" style="padding:3px 14px;">运行项目</button>
                <span id="project-status" style="font-size:11px;color:var(--text-dim);margin-left:auto;"></span>
            </div>
            <div id="project-tabs" class="project-tabs"></div>
            <div id="project-editor-container" class="editor-container" style="flex:1;">
                <textarea id="project-editor"></textarea>
            </div>
        </div>
        <div class="output-pane">
            <div class="pane-header">
                <span class="title">输出</span>
                <button id="project-clear-output" style="background:none;border:1px solid #555;color:#888;padding:1px 8px;border-radius:3px;cursor:pointer;font-size:11px;">清空</button>
            </div>
            <div id="project-output" class="output">
                <span class="placeholder">项目模式 — 创建项目并运行</span>
            </div>
        </div>
        <div id="project-collab-userlist" class="collab-userlist">
            <div class="collab-userlist-header">在线用户</div>
            <div id="project-collab-userlist-items" class="collab-userlist-items"></div>
        </div>
    </div>

    <!-- File context menu -->
    <div id="file-context-menu" class="file-context-menu">
        <div class="file-context-menu-item" data-action="rename">重命名</div>
        <div class="file-context-menu-item" data-action="set-main">设为入口</div>
        <div class="file-context-menu-item danger" data-action="delete">删除</div>
    </div>

    <!-- Project new file modal -->
    <div id="project-modal-overlay" class="project-modal-overlay">
        <div class="project-modal">
            <h3 id="project-modal-title">新建文件</h3>
            <input id="project-modal-input" class="project-modal-input" type="text" placeholder="文件路径（如 lib/helper.duan）">
            <div class="project-modal-btns">
                <button id="project-modal-cancel" class="btn-cancel">取消</button>
                <button id="project-modal-ok" class="btn-ok">确定</button>
            </div>
        </div>
    </div>

    <footer>
        <span id="lang-info">言埠 YanPub</span>
        <span>yanpub v0.7.0</span>
    </footer>

    <div id="share-toast" class="share-toast">分享链接已复制到剪贴板</div>

    <!-- Collab Modal -->
    <div id="collab-modal-overlay" class="collab-modal-overlay">
        <div class="collab-modal">
            <h3>实时协作</h3>
            <div id="collab-modal-join">
                <label>你的昵称</label>
                <input id="collab-display-name" class="collab-input" type="text" placeholder="输入你的昵称" maxlength="20">
                <div class="collab-btn-row">
                    <button id="collab-create-btn" class="collab-action-btn collab-create-btn">创建房间</button>
                </div>
                <hr class="collab-divider">
                <div class="collab-or-text">或者加入已有房间</div>
                <label>房间 ID</label>
                <input id="collab-room-id-input" class="collab-input" type="text" placeholder="输入房间ID">
                <div class="collab-btn-row">
                    <button id="collab-join-btn" class="collab-action-btn collab-join-btn">加入房间</button>
                    <button id="collab-cancel-btn" class="collab-action-btn collab-cancel-btn">取消</button>
                </div>
            </div>
            <div id="collab-modal-connected" style="display:none;">
                <div class="collab-room-info">
                    <div class="room-id-row">
                        <span style="font-size:12px;color:var(--text-dim);">房间 ID:</span>
                        <span id="collab-room-id-display" class="room-id-text"></span>
                        <button id="collab-copy-room-btn" class="copy-btn">复制</button>
                    </div>
                    <div style="font-size:12px;color:var(--text-dim);">
                        在线: <span id="collab-room-user-count">0</span> 人
                    </div>
                </div>
                <div class="collab-btn-row">
                    <button id="collab-leave-btn" class="collab-action-btn collab-leave-btn">离开房间</button>
                    <button id="collab-close-modal-btn" class="collab-action-btn collab-cancel-btn">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal-overlay" class="share-modal-overlay">
        <div class="share-modal">
            <h3>分享代码</h3>
            <label>分享标题（可选）</label>
            <input id="share-title-input" class="share-modal-input" type="text" placeholder="为你的代码起个名字">
            <button id="share-create-btn" class="share-create-btn">创建分享链接</button>
            <div id="share-result" class="share-result">
                <label>分享链接</label>
                <div class="share-url-row">
                    <span id="share-url-text" class="share-url-text"></span>
                    <button id="share-copy-btn" class="share-copy-btn">复制</button>
                </div>
                <label>二维码</label>
                <div class="share-qr-container">
                    <img id="share-qr-img" alt="二维码" style="display:none;">
                </div>
                <label>社交分享</label>
                <div class="share-social-row">
                    <button id="share-weibo-btn" class="share-social-btn">微博</button>
                    <button id="share-wechat-btn" class="share-social-btn">微信（复制链接）</button>
                </div>
            </div>
            <button id="share-close-btn" class="share-close-btn">关闭</button>
        </div>
    </div>

    <!-- CodeMirror 5 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/javascript/javascript.min.js"></script>

    <script src="/static/index.js"></script>
</body>
</html>
