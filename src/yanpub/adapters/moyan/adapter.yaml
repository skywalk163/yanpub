# 墨言 (Moyan) 适配器配置
name: 墨言
id: moyan
version: "0.1.0"

backend:
  type: subprocess
  command: "python"

syntax:
  file_extensions: [".墨", ".moyan"]
  comment_syntax: "--"

execution:
  run: "python -m moyan run {file}"
  eval: "python -m moyan eval {code}"
  repl: "python -m moyan repl"

capabilities:
  repl: true
  lsp: true
  package_manager: true
  wasm: true
  debug: false

colors:
  primary: "#8E44AD"
  secondary: "#9B59B6"
  accent: "#4A235A"
