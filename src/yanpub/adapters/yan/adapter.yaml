# 言 (Yan) 适配器配置
name: 言
id: yan
version: "3.0.0"

backend:
  type: subprocess
  command: "python"
  project_dir: "G:\\dumategithub\\newlisp\\yan"

syntax:
  file_extensions: [".言", ".yan"]
  comment_syntax: "--"

execution:
  run: "python main.py {file}"
  eval: "python main.py -c"
  eval_mode: stdin
  repl: "python main.py"

capabilities:
  repl: true
  lsp: true
  package_manager: true
  wasm: true
  debug: false

colors:
  primary: "#2980B9"
  secondary: "#3498DB"
  accent: "#1A5276"
